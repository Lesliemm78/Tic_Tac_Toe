<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>tic_tac_toe</title>
    <link rel="stylesheet" href="styles.css?v=20260508-3" />
  </head>
  <body>
    <main class="app" aria-labelledby="game-title">
      <section class="scoreboard" aria-label="Scoreboard">
        <div>
          <span class="score-label">You</span>
          <strong id="player-score">0</strong>
        </div>
        <div>
          <span class="score-label">Draws</span>
          <strong id="draw-score">0</strong>
        </div>
        <div>
          <span class="score-label">Computer</span>
          <strong id="computer-score">0</strong>
        </div>
      </section>

      <section class="game-shell" aria-label="Tic Tac Toe game">
        <div class="game-heading">
          <div>
            <p class="eyebrow">Tic Tac Toe</p>
            <h1 id="game-title">Your Move</h1>
          </div>
          <button class="icon-button" id="reset-button" type="button" aria-label="Reset board" title="Reset board">
            <span aria-hidden="true">↻</span>
          </button>
        </div>

        <div class="board" id="board" role="grid" aria-label="Tic Tac Toe board">
          <button class="cell" type="button" role="gridcell" aria-label="Top left"></button>
          <button class="cell" type="button" role="gridcell" aria-label="Top middle"></button>
          <button class="cell" type="button" role="gridcell" aria-label="Top right"></button>
          <button class="cell" type="button" role="gridcell" aria-label="Middle left"></button>
          <button class="cell" type="button" role="gridcell" aria-label="Center"></button>
          <button class="cell" type="button" role="gridcell" aria-label="Middle right"></button>
          <button class="cell" type="button" role="gridcell" aria-label="Bottom left"></button>
          <button class="cell" type="button" role="gridcell" aria-label="Bottom middle"></button>
          <button class="cell" type="button" role="gridcell" aria-label="Bottom right"></button>
        </div>

        <p class="status" id="status" aria-live="polite">Pick a square.</p>
      </section>
    </main>

    <script src="game.js?v=20260508-3"></script>
  </body>
</html>
